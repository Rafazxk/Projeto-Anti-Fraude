<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Guardix - Sistema Anti Fraude</title>
  <link rel="stylesheet" href="style.css"> 
</head>

<body>

<div class="container">

  <h1 class="logo">GUARDIX</h1>
  <p class="sub">Sistema inteligente de detecção de fraudes</p>

  <div class="card">

    <label>Verificar Link</label>
    <input type="text" id="linkInput" placeholder="Cole um link suspeito">

    <label>Analisar Print</label>
    <input type="file" id="printInput">

    <label>Consultar Telefone</label>
    <input type="tel" id="phoneInput" placeholder="Digite um número">

    <button id="btn">ANALISAR</button>

    <div id="loading" style="display:none;">
      <p>Analisando segurança...</p>
    </div>

    <div id="resultado" style="display:none;"></div>

  </div>
</div>

<script>

const btn = document.getElementById("btn");
const result = document.getElementById("resultado");
const loading = document.getElementById("loading");

btn.onclick = async () => {

  result.style.display = "none";
  loading.style.display = "block";
  btn.innerText = "Analisando...";

  let html = "";

  const link = document.getElementById("linkInput").value;
  const numero = document.getElementById("phoneInput").value;
  const file = document.getElementById("printInput").files[0];

  try {

    // LINK
    if (link) {
      const r = await fetch("http://localhost:3000/api/link", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: link })
      });

      const data = await r.json();
      html += criarResultado("Link analisado", data);
    }

    // PHONE
    if (numero) {
      const r = await fetch("http://localhost:3000/api/phone", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ numero: numero })
      });
 
      const data = await r.json();
      html += criarResultado("Telefone analisado", data);
      console.log("telefone: ", numero);
    }

    // PRINT
    if (file) {
      const form = new FormData();
      form.append("imagem", file);

      const r = await fetch("http://localhost:3000/api/print", {
        method: "POST",
        body: form
      });

      const data = await r.json();
      html += criarResultado("Print analisado", data);
    }

  } catch (error) {
    html = "<p>Erro ao conectar com o servidor.</p>";
  }

  loading.style.display = "none";
  btn.innerText = "ANALISAR";

  result.innerHTML = html || "<p>Nenhum dado enviado.</p>";
  result.style.display = "block";
};

function criarResultado(titulo, data) {
  
  if (data.error) {
    return `
      <div>
        <h3>${titulo}</h3>
        <p>${data.error}</p>
      </div>
    `;
  }

  return `
    <div>

      <h3>${titulo}</h3>

      <p><strong>Score:</strong> ${data.score}</p>

      <p><strong>Classificação:</strong> ${data.classificacao}</p>

      <p><strong>Análise:</strong> ${data.analise}</p>

      <div>
        <strong>Riscos:</strong>
        <ul>
          ${(data.riscos || []).map(r => `<li>${r}</li>`).join("")}
        </ul>
      </div>
       
      <div>
        <strong>Recomendação:</strong>
        <p>${data.recomendacao}</p>
      </div>

    </div>
  `;
}
</script>

</body>
</html>
